<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login & Signup - AgriContract</title>
    <!-- Favicon -->
    <link href="assets/hero.png" rel="icon" type="image/png"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="css/style.css" rel="stylesheet"/>
    <style>
        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #ffffff 100%);
            background-image: radial-gradient(var(--primary-light) 1px, transparent 1px);
            background-size: 30px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            -webkit-font-smoothing: antialiased;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 77, 38, 0.15);
            border: 1px solid rgba(0, 112, 60, 0.08);
            display: flex;
            flex-direction: column;
        }

        .auth-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 2.5rem;
            width: 100%;
        }

        .auth-header .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-dark);
            text-decoration: none;
            margin-bottom: 0.5rem;
            width: 100%; /* Force own line */
        }

        .auth-header p {
            display: block;
            width: 100%;
            font-size: 0.95rem;
            color: var(--text-light);
            margin: 0;
            font-weight: 500;
            line-height: 1.4;
        }

        .auth-tabs {
            display: flex;
            width: 100%;
            background: #f1f3f1;
            padding: 0.4rem;
            border-radius: 0.8rem;
            margin-bottom: 2rem;
            box-sizing: border-box;
        }

        .auth-tab {
            flex: 1;
            padding: 0.75rem 1rem;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 0.6rem;
            transition: all 0.2s ease;
            color: var(--text-light);
            user-select: none;
            z-index: 1;
        }

        .auth-tab.active {
            background: var(--white);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .form-group {
            margin-bottom: 1.25rem;
            width: 100%;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 3rem; /* Space for icon */
            border: 1.5px solid #e5e7eb;
            border-radius: 0.75rem;
            font-family: inherit;
            font-size: 0.95rem;
            background: #f9fafb;
            transition: all 0.25s ease;
            box-sizing: border-box;
            color: var(--text);
        }

        .form-group input:focus, .form-group select:focus {
            background: #fff;
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 112, 60, 0.08);
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: #9ca3af;
            font-size: 1.25rem;
            pointer-events: none;
            transition: color 0.25s ease;
        }

        .form-group input:focus ~ .input-icon,
        .form-group select:focus ~ .input-icon {
            color: var(--primary);
        }


        .signup-fields {
            display: none;
        }

        .auth-msg {
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1rem;
            padding: 0.75rem;
            border-radius: 0.6rem;
            display: none;
        }

        .auth-msg.error { background: #fee2e2; color: #b91c1c; display: block; }
        .auth-msg.success { background: #dcfce7; color: #15803d; display: block; }

        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.5rem;
                margin: 0.5rem;
            }
            .auth-header .logo { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="auth-card fade-in">
        <header class="auth-header">
            <a class="logo" href="index.html">
                <span class="material-symbols-outlined" style="font-size: 2.5rem;">agriculture</span>
                AgriContract
            </a>
            <p id="authSubtitle">Login to your account</p>
        </header>

        <!-- <div class="auth-tabs">
            <div class="auth-tab active" id="loginTab">Login</div>
            <div class="auth-tab" id="signupTab">Signup</div>
        </div> -->

        <form id="authForm" style="margin-top: 1rem;">
            <div class="form-group signup-fields">
                <label>Full Name</label>
                <div class="input-group">
                    <input id="fullName" placeholder="Enter your full name" type="text"/>
                    <span class="material-symbols-outlined input-icon">badge</span>
                </div>
            </div>
            
            <div class="form-group">
                <label>Email or Mobile Number</label>
                <div class="input-group">
                    <input id="contact" placeholder="Email or +91..." required type="text"/>
                    <span class="material-symbols-outlined input-icon">person</span>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-group">
                    <input id="password" placeholder="••••••••" required type="password"/>
                    <span class="material-symbols-outlined input-icon">lock</span>
                </div>
            </div>

            <div class="form-group signup-fields">
                <label>Register as</label>
                <div class="input-group">
                    <select id="role">
                        <option value="Seller">Farmer (Seller)</option>
                        <option value="Buyer">Commercial (Buyer)</option>
                    </select>
                    <span class="material-symbols-outlined input-icon">work</span>
                </div>
            </div>

            <button class="btn btn-primary" style="width: 100%; padding: 0.875rem; font-size: 1.05rem; margin-top: 1rem; border-radius: 0.75rem;" type="submit">
                <span id="btnText">Login to AgriContract</span>
            </button>
        </form>

        <div class="auth-msg" id="authMsg"></div>

        <p id="toggleText" style="text-align: center; margin-top: 2.5rem; font-size: 0.9rem; color: var(--text-light);">
            Don't have an account? <a href="#" id="toggleAuth" style="color: var(--primary); font-weight: 700; text-decoration: none;">Create New account</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
